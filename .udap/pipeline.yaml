version: 1
name: url-shortner-01
vcs: github
rollback:
  strategy: manual

stages:
  - id: lint
    kind: lint
    needs: []
    steps:
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

  - id: test
    kind: test
    needs: [lint]
    steps:
      - name: Run pytest
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v

  - id: build
    kind: build
    needs: [test]
    steps:
      - name: Build Docker image
        run: docker build -t url-shortner-01:${{ github.sha }} .

  - id: provision
    kind: provision
    needs: [build]
    steps:
      - name: Terraform init and apply
        run: |
          cd infra
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=url-shortner-01/terraform.tfstate" \
            -backend-config="region=us-east-1"
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

  - id: configure
    kind: configure
    needs: [provision]
    steps:
      - name: Run Ansible playbook
        run: |
          cd ansible
          ansible-playbook -i inventory.ini playbook.yml \
            --private-key=~/.ssh/deploy_key \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  - id: verify
    kind: verify
    needs: [configure]
    steps:
      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.APP_HOST }}/health || exit 1
